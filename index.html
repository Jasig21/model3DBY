<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Visionneuse GLB</title>

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(
          circle at top,
          #2D5B87 0%,
          #111111 60%
        );
    }

    canvas {
      display: block;
    }

    .info {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 10px 14px;
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

  </style>

  <!-- IMPORT MAP -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>

</head>

<body>

  <div class="info">
    Clique + glisse pour tourner autour du modèle
  </div>

  <script type="module">

    import * as THREE from 'three';

    import { OrbitControls }
      from 'three/addons/controls/OrbitControls.js';

    import { DRACOLoader }
      from 'three/addons/loaders/DRACOLoader.js';

    import { GLTFLoader }
      from 'three/addons/loaders/GLTFLoader.js';

    // =========================
    // SCENE
    // =========================

    const scene = new THREE.Scene();

    scene.fog = new THREE.Fog(
      0x111111,
      5,
      15
    );

    // =========================
    // CAMERA
    // =========================

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    camera.position.set(4, 1, 0);
    // =========================
    // RENDERER
    // =========================

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

    renderer.setPixelRatio(
      window.devicePixelRatio
    );

    renderer.outputColorSpace =
      THREE.SRGBColorSpace;

    document.body.appendChild(
      renderer.domElement
    );

    // =========================
    // LIGHTS
    // =========================

    // Lumière ambiante

    const ambientLight =
      new THREE.AmbientLight(
        0xffffff,
        1.5
      );

    scene.add(ambientLight);

    // Lumière directionnelle principale

    const directionalLight =
      new THREE.DirectionalLight(
        0xffffff,
        2
      );

    directionalLight.position.set(
      5,
      5,
      5
    );

    scene.add(directionalLight);

    // Lumière bleue ambiance

    const blueLight =
      new THREE.PointLight(
        0x2D5B87,
        20,
        20
      );

    blueLight.position.set(
      2,
      2,
      3
    );

    scene.add(blueLight);

    // Lumière argentée

    const silverLight =
      new THREE.PointLight(
        0xffffff,
        10,
        20
      );

    silverLight.position.set(
      -3,
      2,
      2
    );

    scene.add(silverLight);

    // =========================
    // CONTROLS
    // =========================

    const controls =
      new OrbitControls(
        camera,
        renderer.domElement
      );

    controls.enableDamping = true;

    controls.dampingFactor = 0.05;

    // =========================
    // MODEL
    // =========================

    let model;

    const loader = new GLTFLoader();

    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath(
      'https://unpkg.com/three@0.165.0/examples/jsm/libs/draco/'
    );
    loader.setDRACOLoader(dracoLoader);

    loader.load(

      './fibule_3D_compressee.glb',

      function (gltf) {

        model = gltf.scene;

        // Centrer légèrement le modèle

        model.position.set(0, 0, 0);

        scene.add(model);

      },

      undefined,

      function (error) {

        console.error(
          'Erreur chargement GLB :',
          error
        );

      }

    );

    // =========================
    // ANIMATION
    // =========================

    function animate() {

      requestAnimationFrame(animate);

      // Rotation automatique lente

      if (model) {

        model.rotation.y += 0.002;

      }

      controls.update();

      renderer.render(
        scene,
        camera
      );

    }

    animate();

    // =========================
    // RESPONSIVE
    // =========================

    window.addEventListener(
      'resize',
      () => {

        camera.aspect =
          window.innerWidth /
          window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
          window.innerWidth,
          window.innerHeight
        );

      }
    );

  </script>

</body>

</html>
